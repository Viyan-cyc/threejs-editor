<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园 3D 可视化场景</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f14; }
    #app { width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* 左上角信息面板 */
    .hud {
      position: fixed; left: 16px; top: 16px; z-index: 10;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8eef6; background: rgba(13, 20, 30, 0.62);
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
      padding: 14px 18px; border-radius: 12px; line-height: 1.7; font-size: 13px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35); max-width: 260px;
    }
    .hud h1 { margin: 0 0 6px; font-size: 15px; font-weight: 600; letter-spacing: .5px; }
    .hud p { margin: 0; opacity: .82; font-size: 12px; }
    .hud .key { display:inline-block; min-width:54px; opacity:.6; }

    /* 右上角工具栏按钮 */
    .toolbar {
      position: fixed; right: 16px; top: 16px; z-index: 10;
      display: flex; gap: 10px;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .toolbar button {
      cursor: pointer; font-size: 13px; color: #e8eef6;
      background: rgba(13, 20, 30, 0.62);
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.14);
      padding: 10px 16px; border-radius: 10px; line-height: 1.4; white-space: nowrap;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      transition: background .2s ease, transform .1s ease;
    }
    .toolbar button:hover { background: rgba(31, 46, 66, 0.85); }
    .toolbar button:active { transform: translateY(1px); }

    #loading {
      position: fixed; inset: 0; display:flex; align-items:center; justify-content:center;
      color:#cdd9e6; font-family: sans-serif; font-size: 14px; letter-spacing: 1px;
      background:#0b0f14; z-index: 50; transition: opacity .6s ease;
    }
  </style>

  <!-- Three.js ES Module importmap：从 CDN 引入，浏览器原生支持 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <h1>🏫 校园 3D 可视化</h1>
    <p><span class="key">左键拖拽</span>旋转视角</p>
    <p><span class="key">右键拖拽</span>平移</p>
    <p><span class="key">滚轮</span>缩放</p>
  </div>

  <div class="toolbar">
    <button id="btn-camera">正交视角 · 点击切换</button>
    <button id="btn-daynight">白天模式 · 点击切换</button>
  </div>

  <div id="loading">场景加载中…</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ============================================================
     * 全局：中心场地缩放系数。使跑道外圈(≈±14)落在道路(±22)内侧，
     * 从而让 用户指定的 坐标（道路±22 / 三环 33–72 / 喷泉 Z=11.8）原样落地。
     * ============================================================ */
    const S = 0.33;

    /* ============================================================
     * 1. 渲染器
     * ============================================================ */
    const app = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;   // 软阴影
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // ACES 电影级色调映射
    renderer.toneMappingExposure = 1.05;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    /* ============================================================
     * 2. 场景 + 雾（增加纵深感）
     * ============================================================ */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfe3f2);
    scene.fog = new THREE.Fog(0xcfe3f2, 300, 600);

    /* ============================================================
     * 3. 双相机（正交等距 + 透视 40°）+ OrbitControls，可一键切换
     * ============================================================ */
    const viewSize = 150;            // 正交相机视口垂直幅度
    const aspect = window.innerWidth / window.innerHeight;

    const orthoCamera = new THREE.OrthographicCamera(
      -viewSize * aspect / 2, viewSize * aspect / 2,
      viewSize / 2, -viewSize / 2,
      0.1, 2000
    );
    orthoCamera.position.set(150, 150, 150);
    orthoCamera.lookAt(0, 0, 0);

    const perspCamera = new THREE.PerspectiveCamera(40, aspect, 0.1, 3000);
    perspCamera.position.set(150, 150, 150);
    perspCamera.lookAt(0, 0, 0);

    let activeCamera = orthoCamera;

    const controls = new OrbitControls(orthoCamera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2 - 0.02;
    controls.minPolarAngle = 0.15;
    controls.minZoom = 0.35;
    controls.maxZoom = 3.0;

    /* ============================================================
     * 4. 光照：主光 + 环境光 + 半球光
     * ============================================================ */
    const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x6b8f5a, 0.95);
    scene.add(hemi);

    const ambient = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff3e0, 2.0);
    sun.position.set(70, 110, 50);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 400;
    sun.shadow.camera.left = -140;
    sun.shadow.camera.right = 140;
    sun.shadow.camera.top = 140;
    sun.shadow.camera.bottom = -140;
    sun.shadow.bias = -0.0004;
    sun.shadow.normalBias = 0.02;
    scene.add(sun);
    scene.add(sun.target);

    /* ============================================================
     * 5. 地面 + 渐变草皮贴片
     * ============================================================ */
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(700, 700),
      new THREE.MeshStandardMaterial({ color: 0x7fae5a, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    function makeGrassPatchTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(128, 128, 10, 128, 128, 128);
      g.addColorStop(0, 'rgba(150,190,95,0.55)');
      g.addColorStop(0.6, 'rgba(120,160,80,0.30)');
      g.addColorStop(1, 'rgba(120,160,80,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    const grassTex = makeGrassPatchTexture();
    const grassMat = new THREE.MeshStandardMaterial({
      map: grassTex, transparent: true, depthWrite: false, roughness: 1
    });
    for (let i = 0; i < 28; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 82 + Math.random() * 90; // 草皮在外层绿地处
      const size = 14 + Math.random() * 24;
      const patch = new THREE.Mesh(new THREE.PlaneGeometry(size, size), grassMat);
      patch.rotation.x = -Math.PI / 2;
      patch.rotation.z = Math.random() * Math.PI;
      patch.position.set(Math.cos(angle) * radius, 0.02, Math.sin(angle) * radius);
      scene.add(patch);
    }

    /* ============================================================
     * 6. 居中运动场（整体 ×S 缩小）：圆角跑道 + 足球场白线
     * ============================================================ */
    function roundedRectShape(w, h, r) {
      const s = new THREE.Shape();
      const x = -w / 2, y = -h / 2;
      s.moveTo(x, y + r);
      s.lineTo(x, y + h - r);
      s.quadraticCurveTo(x, y + h, x + r, y + h);
      s.lineTo(x + w - r, y + h);
      s.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
      s.lineTo(x + w, y + r);
      s.quadraticCurveTo(x + w, y, x + w - r, y);
      s.lineTo(x + r, y);
      s.quadraticCurveTo(x, y, x, y + r);
      return s;
    }

    const TRACK_W = 84 * S, TRACK_H = 54 * S, TRACK_R = 27 * S;
    const INNER_W = 70 * S, INNER_H = 40 * S, INNER_R = 20 * S;
    const trackShape = roundedRectShape(TRACK_W, TRACK_H, TRACK_R);
    trackShape.holes.push(roundedRectShape(INNER_W, INNER_H, INNER_R));
    const track = new THREE.Mesh(
      new THREE.ExtrudeGeometry(trackShape, { depth: 0.3, bevelEnabled: false }),
      new THREE.MeshStandardMaterial({ color: 0x6e8cbe, roughness: 0.75 })
    );
    track.rotation.x = -Math.PI / 2;
    track.position.y = 0.06;
    track.receiveShadow = true;
    scene.add(track);

    function makeFieldTexture() {
      const c = document.createElement('canvas');
      c.width = 1500; c.height = 950;
      const ctx = c.getContext('2d');
      const W = c.width, H = c.height, m = 26;
      ctx.fillStyle = '#4f9a3e';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 10; i++) {
        ctx.fillStyle = i % 2 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';
        ctx.fillRect((W / 10) * i, 0, W / 10, H);
      }
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 6;
      ctx.strokeRect(m, m, W - 2 * m, H - 2 * m);
      ctx.beginPath(); ctx.moveTo(W / 2, m); ctx.lineTo(W / 2, H - m); ctx.stroke();
      ctx.beginPath(); ctx.arc(W / 2, H / 2, H * 0.16, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(W / 2, H / 2, 7, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
      function penaltyBoxes(side) {
        const boxW = W * 0.12, boxH = H * 0.52;
        const gaW = W * 0.05, gaH = H * 0.24;
        const x = side === 'L' ? m : W - m - boxW;
        const xg = side === 'L' ? m : W - m - gaW;
        ctx.strokeRect(x, (H - boxH) / 2, boxW, boxH);
        ctx.strokeRect(xg, (H - gaH) / 2, gaW, gaH);
        ctx.beginPath();
        ctx.arc(side === 'L' ? m + boxW * 0.72 : W - m - boxW * 0.72, H / 2, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill();
      }
      penaltyBoxes('L'); penaltyBoxes('R');
      const cr = 18;
      [[m, m, 0], [W - m, m, Math.PI / 2], [W - m, H - m, Math.PI], [m, H - m, -Math.PI / 2]]
        .forEach(([cx, cy, a]) => { ctx.beginPath(); ctx.arc(cx, cy, cr, a, a + Math.PI / 2); ctx.stroke(); });
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }
    const field = new THREE.Mesh(
      new THREE.PlaneGeometry(60 * S, 38 * S),
      new THREE.MeshStandardMaterial({ map: makeFieldTexture(), roughness: 0.9 })
    );
    field.rotation.x = -Math.PI / 2;
    field.position.y = 0.05;
    field.receiveShadow = true;
    scene.add(field);

    /* ============================================================
     * 7. 内层白色现代建筑工厂（整体 ×S，四面玻璃窗 + 雨棚 + 装饰带）
     * ============================================================ */
    const windowMat = new THREE.MeshPhysicalMaterial({
      color: 0x4ea8de, metalness: 0.4, roughness: 0.12,
      transparent: true, opacity: 0.85,
      emissive: 0x123a52, emissiveIntensity: 0.25,
      clearcoat: 0.4, clearcoatRoughness: 0.1
    });

    function buildWindowWall(gridW, wallH, center, rotY) {
      const winW = 1.3, gapX = 0.9, gapY = 0.8;
      const marginY = wallH * 0.10, marginX = 1.0;
      const usableW = Math.max(winW, gridW - marginX * 2);
      const usableH = Math.max(2, wallH - marginY * 2);
      const cols = Math.max(1, Math.floor((usableW + gapX) / (winW + gapX)));
      const rows = Math.max(1, Math.round(usableH / (1.8 + gapY)));
      const winH = (usableH - (rows - 1) * gapY) / rows;
      const totalW = cols * winW + (cols - 1) * gapX;
      const startX = -totalW / 2 + winW / 2;
      const startY = -usableH / 2 + winH / 2;
      const geo = new THREE.PlaneGeometry(winW, winH);
      const wall = new THREE.Group();
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const m = new THREE.Mesh(geo, windowMat);
          m.position.set(startX + c * (winW + gapX), startY + r * (winH + gapY), 0);
          wall.add(m);
        }
      }
      wall.position.copy(center);
      wall.rotation.y = rotY;
      return wall;
    }

    function makeBuilding(cfg) {
      const { x = 0, z = 0, w, d, h, bodyColor = 0xf9f9f9, accent = 0x3b5b8a } = cfg;
      const g = new THREE.Group();
      g.position.set(x, 0, z);
      const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.6 });
      const trimMat = new THREE.MeshStandardMaterial({ color: accent, roughness: 0.55 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
      body.position.y = h / 2;
      body.castShadow = true; body.receiveShadow = true;
      g.add(body);
      const parapet = new THREE.Mesh(new THREE.BoxGeometry(w + 0.5, 0.9, d + 0.5), bodyMat);
      parapet.position.y = h + 0.45;
      parapet.castShadow = true; parapet.receiveShadow = true;
      g.add(parapet);
      const band = new THREE.Mesh(new THREE.BoxGeometry(w + 0.2, 1.4, d + 0.2), trimMat);
      band.position.y = 0.7;
      band.castShadow = true; band.receiveShadow = true;
      g.add(band);
      const canopy = new THREE.Mesh(new THREE.BoxGeometry(w * 0.5, 0.3, 3.2), trimMat);
      canopy.position.set(0, 3.0, d / 2 + 1.6);
      canopy.castShadow = true;
      g.add(canopy);
      const postGeo = new THREE.BoxGeometry(0.25, 3, 0.25);
      for (const px of [-w * 0.22, w * 0.22]) {
        const post = new THREE.Mesh(postGeo, bodyMat);
        post.position.set(px, 1.5, d / 2 + 3.0);
        post.castShadow = true;
        g.add(post);
      }
      g.add(buildWindowWall(w, h, new THREE.Vector3(0, h / 2, d / 2 + 0.02), 0));
      g.add(buildWindowWall(w, h, new THREE.Vector3(0, h / 2, -d / 2 - 0.02), Math.PI));
      g.add(buildWindowWall(d, h, new THREE.Vector3(w / 2 + 0.02, h / 2, 0), Math.PI / 2));
      g.add(buildWindowWall(d, h, new THREE.Vector3(-w / 2 - 0.02, h / 2, 0), -Math.PI / 2));
      return g;
    }

    // 8 栋白色内层建筑：原始尺寸 ×S，排到半径 18 的环上并朝向中心
    const innerSpec = [
      { w: 14, d: 12, h: 16, accent: 0x3b5b8a },
      { w: 24, d: 12, h: 11, accent: 0x2f7d6b },
      { w: 14, d: 14, h: 21, accent: 0x8a5a2f },
      { w: 12, d: 16, h: 14, accent: 0x6a3b8a },
      { w: 16, d: 12, h: 18, accent: 0x8a3b5b },
      { w: 26, d: 12, h: 10, accent: 0x2f6b8a },
      { w: 14, d: 14, h: 23, accent: 0x5b8a3b },
      { w: 12, d: 12, h: 15, accent: 0x8a6a3b },
    ];
    const innerBuildings = innerSpec.map((c, i) => {
      const angle = (i / 8) * Math.PI * 2; // 0,45,...;90°(+Z) 即「学生中心」
      const r = 18;
      const b = makeBuilding({ w: c.w * S, d: c.d * S, h: c.h * S, accent: c.accent });
      b.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
      b.rotation.y = Math.atan2(-b.position.x, -b.position.z); // 朝向中心
      scene.add(b);
      return b;
    });

    /* ============================================================
     * 8. 周边道路系统：4 条道路（X=±22 沿 Z，Z=±22 沿 X），宽 3.2
     *    深灰沥青 + 两侧白色虚线边缘 + 中间黄色虚中心线（Canvas 纹理）
     * ============================================================ */
    const ROAD_WID = 3.2, ROAD_LEN = 150; // 长度延伸至场景边缘（贯穿三环）
    function makeRoadTexture() {
      const c = document.createElement('canvas');
      c.width = 64; c.height = 256; // 64=宽度方向, 256=长度方向(一个虚线周期)
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#36363c'; ctx.fillRect(0, 0, 64, 256);          // 沥青
      ctx.fillStyle = '#f2c14e'; ctx.fillRect(30, 0, 4, 120);          // 中心黄色虚线
      ctx.fillStyle = '#d8d8d8'; ctx.fillRect(4, 0, 3, 120);           // 左白虚边
      ctx.fillRect(57, 0, 3, 120);                                     // 右白虚边
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapT = THREE.RepeatWrapping; // 沿长度方向(V)平铺
      return tex;
    }
    function makeRoad() {
      const grp = new THREE.Group();
      const tex = makeRoadTexture();
      tex.repeat.set(1, ROAD_LEN / 12); // 每 12 单位一个虚线周期
      const surf = new THREE.Mesh(
        new THREE.PlaneGeometry(ROAD_WID, ROAD_LEN),
        new THREE.MeshStandardMaterial({ map: tex, roughness: 0.95 })
      );
      surf.rotation.x = -Math.PI / 2; // 长度沿 Z
      surf.receiveShadow = true;
      grp.add(surf);
      return grp;
    }
    // 竖向道路（沿 Z，X=±22）
    const roads = [];
    [22, -22].forEach((cx) => {
      const r = makeRoad(); r.position.x = cx; scene.add(r);
      roads.push({ axis: 'z', fixed: cx });
    });
    // 横向道路（沿 X，Z=±22）
    [22, -22].forEach((cz) => {
      const r = makeRoad(); r.rotation.y = Math.PI / 2; r.position.z = cz; scene.add(r);
      roads.push({ axis: 'x', fixed: cz });
    });

    /* ============================================================
     * 9. 外层建筑群：createOuterBuilding 低多边形浅灰建筑，3 个环层共约 60 栋
     * ============================================================ */
    function makeFacadeTexture(base) {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base; ctx.fillRect(0, 0, 128, 128);
      ctx.fillStyle = 'rgba(120,128,136,0.85)'; // 窗格
      const cols = 4, rows = 4, pad = 10, gap = 6;
      const ww = (128 - pad * 2 - (cols - 1) * gap) / cols;
      const wh = (128 - pad * 2 - (rows - 1) * gap) / rows;
      for (let r = 0; r < rows; r++)
        for (let cc = 0; cc < cols; cc++)
          ctx.fillRect(pad + cc * (ww + gap), pad + r * (wh + gap), ww, wh);
      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    }
    const facadeTexs = [
      makeFacadeTexture('#c6cbd0'), makeFacadeTexture('#bcc1c6'), makeFacadeTexture('#ced3d8')
    ];
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x8a8f95, roughness: 0.85 });
    const outerBandMat = new THREE.MeshStandardMaterial({ color: 0x6f7479, roughness: 0.85 });

    function createOuterBuilding(cfg) {
      const { x, z, w, d, h, tex } = cfg;
      const g = new THREE.Group();
      g.position.set(x, 0, z);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.75, map: tex });
      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
      body.position.y = h / 2; body.castShadow = true; body.receiveShadow = true;
      g.add(body);
      const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 0.4, 0.4, d + 0.4), roofMat);
      roof.position.y = h + 0.2; roof.castShadow = true; g.add(roof);
      const band = new THREE.Mesh(new THREE.BoxGeometry(w + 0.2, 0.8, d + 0.2), outerBandMat);
      band.position.y = 0.4; g.add(band);
      return g;
    }

    const ringSpec = [
      { rMin: 33, rMax: 40, hMin: 3.5, hMax: 5.0, count: 18 }, // 近环（较高）
      { rMin: 44, rMax: 55, hMin: 2.0, hMax: 3.5, count: 20 }, // 中环
      { rMin: 58, rMax: 72, hMin: 1.8, hMax: 3.0, count: 22 }, // 远环（较矮）
    ];
    const outerPositions = []; // 用于建筑互相避让
    const roadClearance = ROAD_WID / 2 + 5; // 建筑离道路的最小净空（含半宽+缓冲）
    for (const ring of ringSpec) {
      let placed = 0, tries = 0;
      while (placed < ring.count && tries < ring.count * 60) {
        tries++;
        const ang = Math.random() * Math.PI * 2;
        const rad = ring.rMin + Math.random() * (ring.rMax - ring.rMin);
        const x = Math.cos(ang) * rad, z = Math.sin(ang) * rad;
        const w = 4 + Math.random() * 4, d = 4 + Math.random() * 4;
        // 避开 4 条道路（|x|≈22 或 |z|≈22）
        if (Math.abs(Math.abs(x) - 22) < roadClearance) continue;
        if (Math.abs(Math.abs(z) - 22) < roadClearance) continue;
        // 建筑互相避让
        let tooClose = false;
        for (const p of outerPositions) {
          if (Math.hypot(x - p.x, z - p.z) < 9) { tooClose = true; break; }
        }
        if (tooClose) continue;
        const h = ring.hMin + Math.random() * (ring.hMax - ring.hMin);
        const b = createOuterBuilding({
          x, z, w, d, h, tex: facadeTexs[Math.floor(Math.random() * facadeTexs.length)]
        });
        b.rotation.y = Math.random() * Math.PI * 2;
        scene.add(b);
        outerPositions.push({ x, z });
        placed++;
      }
    }

    /* ============================================================
     * 10. 移动车辆：createVehicle（车身/驾驶舱/保险杠/轮子 + 前大灯 SpotLight + 尾灯）
     *     每条道路 2 辆，不同颜色与速度，沿道路方向移动、到头循环
     * ============================================================ */
    function createVehicle(color) {
      const g = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.5 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x222226, roughness: 0.6, metalness: 0.4 });
      const glassMat = new THREE.MeshStandardMaterial({ color: 0x101418, roughness: 0.1, metalness: 0.6 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.8, 4.2), bodyMat);
      body.position.y = 0.7; body.castShadow = true; g.add(body);
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.7, 2.0), glassMat);
      cabin.position.set(0, 1.35, -0.2); cabin.castShadow = true; g.add(cabin);
      const fb = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.5, 0.4), darkMat);
      fb.position.set(0, 0.55, 2.1); g.add(fb);
      const rb = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.5, 0.4), darkMat);
      rb.position.set(0, 0.55, -2.1); g.add(rb);

      const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 12);
      wheelGeo.rotateZ(Math.PI / 2);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111114, roughness: 0.8 });
      [[-1.0, 1.4], [1.0, 1.4], [-1.0, -1.4], [1.0, -1.4]].forEach(([wx, wz]) => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.position.set(wx, 0.45, wz); g.add(w);
      });

      // 前大灯（前 = +Z）：发光盒 + 向前 SpotLight
      const hlMat = new THREE.MeshStandardMaterial({ color: 0xfff4cc, emissive: 0xfff0b0, emissiveIntensity: 1.4 });
      [[-0.6], [0.6]].forEach(([hx]) => {
        const hl = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.1), hlMat);
        hl.position.set(hx, 0.8, 2.05); g.add(hl);
      });
      const spot = new THREE.SpotLight(0xfff0c0, 14, 30, Math.PI / 7, 0.5, 1.2);
      spot.position.set(0, 1.0, 2.0);
      spot.castShadow = false;
      spot.target.position.set(0, 0, 14); // 向前照
      g.add(spot); g.add(spot.target);

      // 尾灯（后 = -Z）
      const tlMat = new THREE.MeshStandardMaterial({ color: 0xff3b30, emissive: 0xff2a20, emissiveIntensity: 1.2 });
      [[-0.6], [0.6]].forEach(([tx]) => {
        const tl = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.08), tlMat);
        tl.position.set(tx, 0.8, -2.05); g.add(tl);
      });
      return g;
    }

    const vehicles = [];
    const carColors = [0xd64545, 0x3b82c4, 0xe0a800, 0x4caf50, 0x9b59b6, 0xecf0f1, 0xe67e22, 0x2c3e50];
    roads.forEach((rd, ri) => {
      for (let k = 0; k < 2; k++) { // 每条道路 2 辆，反向行驶
        const dir = k === 0 ? 1 : -1;
        const lane = dir > 0 ? -0.8 : 0.8; // 靠右行驶
        const v = createVehicle(carColors[(ri * 2 + k) % carColors.length]);
        const speed = 6 + Math.random() * 9;
        if (rd.axis === 'z') {
          v.position.set(rd.fixed + lane, 0, dir > 0 ? -ROAD_LEN / 2 + 8 : ROAD_LEN / 2 - 8);
          v.rotation.y = dir > 0 ? 0 : Math.PI;
        } else {
          v.position.set(dir > 0 ? -ROAD_LEN / 2 + 8 : ROAD_LEN / 2 - 8, 0, rd.fixed + lane);
          v.rotation.y = dir > 0 ? Math.PI / 2 : -Math.PI / 2;
        }
        scene.add(v);
        vehicles.push({ mesh: v, axis: rd.axis, dir, speed });
      }
    });
    function updateVehicles(dt) {
      const H = ROAD_LEN / 2;
      for (const v of vehicles) {
        if (v.axis === 'z') {
          v.mesh.position.z += v.dir * v.speed * dt;
          if (v.mesh.position.z > H) v.mesh.position.z -= ROAD_LEN;
          else if (v.mesh.position.z < -H) v.mesh.position.z += ROAD_LEN;
        } else {
          v.mesh.position.x += v.dir * v.speed * dt;
          if (v.mesh.position.x > H) v.mesh.position.x -= ROAD_LEN;
          else if (v.mesh.position.x < -H) v.mesh.position.x += ROAD_LEN;
        }
      }
    }

    /* ============================================================
     * 11. 三层喷泉：石质基座 + 三层水池 + 350 粒子（3 层速度 / 重力 / 水面重置）
     *     位置 (0,0,11.8)，在足球场与学生中心之间
     * ============================================================ */
    const FOUNTAIN = new THREE.Group();
    FOUNTAIN.position.set(0, 0, 11.8);
    scene.add(FOUNTAIN);
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0xb8bcc0, roughness: 0.85 });
    const fountainWaterMat = new THREE.MeshStandardMaterial({
      color: 0x4a90c8, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.75
    });
    const basin = new THREE.Mesh(new THREE.CylinderGeometry(3.0, 3.2, 0.7, 28), stoneMat);
    basin.position.y = 0.35; basin.castShadow = true; basin.receiveShadow = true; FOUNTAIN.add(basin);
    const water1 = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 0.2, 28), fountainWaterMat);
    water1.position.y = 0.66; FOUNTAIN.add(water1);
    const ped1 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1.2, 18), stoneMat);
    ped1.position.y = 1.25; ped1.castShadow = true; FOUNTAIN.add(ped1);
    const bowl1 = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.2, 0.4, 22), stoneMat);
    bowl1.position.y = 1.95; bowl1.castShadow = true; FOUNTAIN.add(bowl1);
    const ped2 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.45, 0.8, 18), stoneMat);
    ped2.position.y = 2.55; FOUNTAIN.add(ped2);
    const bowl2 = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.75, 0.3, 20), stoneMat);
    bowl2.position.y = 3.0; FOUNTAIN.add(bowl2);
    const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.25, 0.4, 14), stoneMat);
    nozzle.position.y = 3.35; FOUNTAIN.add(nozzle);

    function makeFountainParticleTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.4, 'rgba(200,230,255,0.7)');
      g.addColorStop(1, 'rgba(180,220,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
    }
    const PCOUNT = 350;
    const NOZZLE_Y = 3.55;   // 喷射起点（局部高度）
    const WATER_Y = 0.66;    // 水面高度，低于则重置
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(PCOUNT * 3);
    const pVel = new Array(PCOUNT);
    const pLayer = new Int8Array(PCOUNT);
    function resetParticle(i) {
      const layer = pLayer[i];
      let spread, vy;
      if (layer === 0) { spread = 0.25; vy = 7.5 + Math.random() * 3.0; }   // 中心高速水柱
      else if (layer === 1) { spread = 0.7; vy = 4.0 + Math.random() * 2.0; } // 中速水帘
      else { spread = 1.4; vy = 2.2 + Math.random() * 1.6; }                  // 外层散开
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * spread;
      pVel[i] = {
        x: Math.cos(a) * r * 1.2, z: Math.sin(a) * r * 1.2, y: vy,
        bx: Math.cos(a) * (layer * 0.5), bz: Math.sin(a) * (layer * 0.5) // 出生半径外层更大
      };
    }
    for (let i = 0; i < PCOUNT; i++) {
      pLayer[i] = i < 120 ? 0 : i < 240 ? 1 : 2;
      resetParticle(i);
      pPos[i * 3] = pVel[i].bx;
      pPos[i * 3 + 1] = WATER_Y + 0.2 + Math.random() * 6; // 初始随机高度，避免首帧聚成一团
      pPos[i * 3 + 2] = pVel[i].bz;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
      size: 0.5, map: makeFountainParticleTexture(), transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending, color: 0xcdeaff, sizeAttenuation: true
    }));
    FOUNTAIN.add(particles);
    function updateFountain(dt) {
      const pos = pGeo.attributes.position.array;
      for (let i = 0; i < PCOUNT; i++) {
        const v = pVel[i];
        v.y -= 5.9 * dt; // 重力（缩放后）
        pos[i * 3] += v.x * dt;
        pos[i * 3 + 1] += v.y * dt;
        pos[i * 3 + 2] += v.z * dt;
        if (pos[i * 3 + 1] < WATER_Y) { // 落回水面 -> 从喷嘴重新喷出
          resetParticle(i);
          pos[i * 3] = v.bx; pos[i * 3 + 1] = NOZZLE_Y; pos[i * 3 + 2] = v.bz;
        }
      }
      pGeo.attributes.position.needsUpdate = true;
    }

    /* ============================================================
     * 12. 路灯（沿道路排布，共享灯泡材质 -> 昼夜联动）
     * ============================================================ */
    const lampPoleMat = new THREE.MeshStandardMaterial({ color: 0x2a2f36, roughness: 0.5, metalness: 0.6 });
    const lampBulbMat = new THREE.MeshStandardMaterial({
      color: 0xfff2cc, emissive: 0xffcf7a, emissiveIntensity: 0.15, roughness: 0.3
    });
    const lampPoleGeo = new THREE.CylinderGeometry(0.12, 0.16, 6, 8);
    const lampBulbGeo = new THREE.SphereGeometry(0.4, 14, 14);
    function addLamp(x, z) {
      const lamp = new THREE.Group();
      lamp.position.set(x, 0, z);
      const pole = new THREE.Mesh(lampPoleGeo, lampPoleMat);
      pole.position.y = 3; pole.castShadow = true; lamp.add(pole);
      const bulb = new THREE.Mesh(lampBulbGeo, lampBulbMat);
      bulb.position.y = 6.1; lamp.add(bulb);
      scene.add(lamp);
    }
    // 沿 4 条道路两侧每隔 30 单位布置
    for (const at of [-60, -30, 0, 30, 60]) {
      addLamp(22 + 2.2, at);  addLamp(-22 - 2.2, at);   // 竖向道路两侧
      addLamp(at, 22 + 2.2);  addLamp(at, -22 - 2.2);   // 横向道路两侧
    }

    /* ============================================================
     * 13. 长椅（散布在道路与近环之间的草坪）
     * ============================================================ */
    function makeBench() {
      const g = new THREE.Group();
      const wood = new THREE.MeshStandardMaterial({ color: 0x8a6a45, roughness: 0.8 });
      const metal = new THREE.MeshStandardMaterial({ color: 0x44484c, roughness: 0.6, metalness: 0.5 });
      const seat = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.12, 0.7), wood);
      seat.position.y = 0.5; seat.castShadow = true; g.add(seat);
      const back = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.5, 0.1), wood);
      back.position.set(0, 0.8, -0.3); g.add(back);
      for (const lx of [-0.9, 0.9]) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.6), metal);
        leg.position.set(lx, 0.25, 0); g.add(leg);
      }
      return g;
    }
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2 + 0.2;
      const r = 26 + Math.random() * 3;
      const b = makeBench();
      b.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
      b.rotation.y = a + Math.PI / 2;
      scene.add(b);
    }

    /* ============================================================
     * 14. 旗杆 + 飘动旗帜（场景中轴 X=0, Z=-8）
     * ============================================================ */
    const flagGroup = new THREE.Group();
    flagGroup.position.set(0, 0, -8);
    scene.add(flagGroup);
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.15, 16, 10),
      new THREE.MeshStandardMaterial({ color: 0x9aa0a6, metalness: 0.6, roughness: 0.4 })
    );
    pole.position.y = 8; pole.castShadow = true; flagGroup.add(pole);
    const finial = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.3 })
    );
    finial.position.y = 16.2; flagGroup.add(finial);
    const flagGeo = new THREE.PlaneGeometry(5, 3, 12, 1);
    const flag = new THREE.Mesh(flagGeo, new THREE.MeshStandardMaterial({
      color: 0xd64545, roughness: 0.7, side: THREE.DoubleSide
    }));
    flag.position.set(2.5, 14, 0); // 左边贴旗杆
    flagGroup.add(flag);
    const flagBaseX = flagGeo.attributes.position.array.slice(); // 备份初始顶点
    function updateFlag(t) {
      const pa = flagGeo.attributes.position.array;
      for (let i = 0; i < pa.length; i += 3) {
        const bx = flagBaseX[i];
        const nx = (bx + 2.5) / 5; // 0=贴杆, 1=自由端
        pa[i + 2] = Math.sin(bx * 1.5 + t * 4) * 0.5 * nx; // z 向飘动，自由端幅度大
      }
      flagGeo.attributes.position.needsUpdate = true;
      flagGeo.computeVertexNormals();
    }

    /* ============================================================
     * 15. 树木（外层绿地散布，避开建筑/道路）
     * ============================================================ */
    const trunkGeo = new THREE.CylinderGeometry(0.28, 0.4, 1, 8);
    const coneGeo = new THREE.ConeGeometry(1, 1, 9);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4a2b, roughness: 0.9 });
    const leafMats = [
      new THREE.MeshStandardMaterial({ color: 0x3f7d3a, roughness: 0.85 }),
      new THREE.MeshStandardMaterial({ color: 0x4f9145, roughness: 0.85 }),
      new THREE.MeshStandardMaterial({ color: 0x356b32, roughness: 0.85 }),
    ];
    function makeTree(x, z, scale) {
      const g = new THREE.Group();
      g.position.set(x, 0, z);
      const mat = leafMats[Math.floor(Math.random() * leafMats.length)];
      const trunkH = 2.2 * scale;
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.scale.set(scale, trunkH, scale);
      trunk.position.y = trunkH / 2; trunk.castShadow = true; g.add(trunk);
      const layers = [
        { r: 2.4 * scale, h: 3.0 * scale, y: trunkH + 1.0 * scale },
        { r: 1.9 * scale, h: 2.6 * scale, y: trunkH + 2.8 * scale },
        { r: 1.3 * scale, h: 2.2 * scale, y: trunkH + 4.4 * scale },
      ];
      for (const L of layers) {
        const cone = new THREE.Mesh(coneGeo, mat);
        cone.scale.set(L.r, L.h, L.r);
        cone.position.y = L.y; cone.castShadow = true; g.add(cone);
      }
      return g;
    }
    let treesPlaced = 0, treeTries = 0;
    while (treesPlaced < 36 && treeTries < 800) {
      treeTries++;
      const angle = Math.random() * Math.PI * 2;
      const radius = 76 + Math.random() * 60;
      const x = Math.cos(angle) * radius, z = Math.sin(angle) * radius;
      if (Math.abs(Math.abs(x) - 22) < 4 || Math.abs(Math.abs(z) - 22) < 4) continue; // 避道路
      let tooClose = false;
      for (const p of outerPositions) {
        if (Math.hypot(x - p.x, z - p.z) < 7) { tooClose = true; break; }
      }
      if (tooClose) continue;
      scene.add(makeTree(x, z, 0.7 + Math.random() * 0.9));
      treesPlaced++;
    }

    /* ============================================================
     * 16. 内圈广场步道（跑道与内层建筑之间的环形步道）
     * ============================================================ */
    const pathMat = new THREE.MeshStandardMaterial({ color: 0xd7cdb8, roughness: 0.95 });
    function makePath(x1, z1, x2, z2, width = 3.2) {
      const dx = x2 - x1, dz = z2 - z1;
      const len = Math.hypot(dx, dz);
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, 0.12, width), pathMat);
      mesh.position.set((x1 + x2) / 2, 0.06, (z1 + z2) / 2);
      mesh.rotation.y = -Math.atan2(dz, dx);
      mesh.receiveShadow = true;
      scene.add(mesh);
    }
    for (let i = 0; i < 40; i++) {
      const a1 = (i / 40) * Math.PI * 2, a2 = ((i + 1) / 40) * Math.PI * 2;
      makePath(Math.cos(a1) * 15.5, Math.sin(a1) * 15.5, Math.cos(a2) * 15.5, Math.sin(a2) * 15.5, 2.2);
    }

    /* ============================================================
     * 17. 窗口缩放（双相机都要更新）
     * ============================================================ */
    function onResize() {
      const w = window.innerWidth, h = window.innerHeight;
      const a = w / h;
      orthoCamera.left = -viewSize * a / 2;
      orthoCamera.right = viewSize * a / 2;
      orthoCamera.top = viewSize / 2;
      orthoCamera.bottom = -viewSize / 2;
      orthoCamera.updateProjectionMatrix();
      perspCamera.aspect = a;
      perspCamera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    /* ============================================================
     * 18. 渲染循环（车辆 / 喷泉 / 旗帜 持续更新）
     * ============================================================ */
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;
      controls.update();
      updateVehicles(dt);
      updateFountain(dt);
      updateFlag(t);
      renderer.render(scene, activeCamera);
    }

    /* ============================================================
     * 19. 昼夜预设 + 顶部按钮交互
     * ============================================================ */
    const dayPreset = {
      bg: 0xcfe3f2, fog: 0xcfe3f2, fogNear: 300, fogFar: 600,
      hemiSky: 0xbfe3ff, hemiGround: 0x6b8f5a, hemiIntensity: 0.95,
      ambientColor: 0xffffff, ambientIntensity: 0.25,
      sunColor: 0xfff3e0, sunIntensity: 2.0,
      exposure: 1.05,
      windowEmissive: 0x123a52, windowEmissiveIntensity: 0.25,
      lampEmissiveIntensity: 0.15,
    };
    const nightPreset = {
      bg: 0x162030, fog: 0x162030, fogNear: 220, fogFar: 540,
      hemiSky: 0x243a5e, hemiGround: 0x0e1620, hemiIntensity: 0.30,
      ambientColor: 0x3a4a66, ambientIntensity: 0.18,
      sunColor: 0xaec6ee, sunIntensity: 0.35,
      exposure: 0.7,
      windowEmissive: 0xffcf7a, windowEmissiveIntensity: 1.4,
      lampEmissiveIntensity: 2.6,
    };
    function applyPreset(p) {
      scene.background = new THREE.Color(p.bg);
      scene.fog.color.set(p.fog);
      scene.fog.near = p.fogNear;
      scene.fog.far = p.fogFar;
      hemi.color.set(p.hemiSky);
      hemi.groundColor.set(p.hemiGround);
      hemi.intensity = p.hemiIntensity;
      ambient.color.set(p.ambientColor);
      ambient.intensity = p.ambientIntensity;
      sun.color.set(p.sunColor);
      sun.intensity = p.sunIntensity;
      renderer.toneMappingExposure = p.exposure;
      windowMat.emissive.set(p.windowEmissive);
      windowMat.emissiveIntensity = p.windowEmissiveIntensity;
      lampBulbMat.emissiveIntensity = p.lampEmissiveIntensity;
    }

    // 按钮：切换正交 / 透视（FOV/zoom 匹配画面尺度，target 全程不变）
    const btnCam = document.getElementById('btn-camera');
    const tanHalfFov = Math.tan(THREE.MathUtils.degToRad(40) / 2);
    btnCam.addEventListener('click', () => {
      const target = controls.target;
      if (activeCamera === orthoCamera) {
        const dir = new THREE.Vector3().subVectors(orthoCamera.position, target).normalize();
        const D = (viewSize / 2) / (orthoCamera.zoom * tanHalfFov);
        perspCamera.position.copy(target).addScaledVector(dir, D);
        activeCamera = perspCamera;
        btnCam.textContent = '透视视角 · 点击切换';
      } else {
        const offset = new THREE.Vector3().subVectors(perspCamera.position, target);
        const D = offset.length();
        const zoom = THREE.MathUtils.clamp((viewSize / 2) / (D * tanHalfFov), controls.minZoom, controls.maxZoom);
        orthoCamera.zoom = zoom;
        orthoCamera.position.copy(target).addScaledVector(offset.normalize(), D);
        activeCamera = orthoCamera;
        btnCam.textContent = '正交视角 · 点击切换';
      }
      controls.object = activeCamera;
      controls.update();
    });

    let isNight = false;
    const btnDay = document.getElementById('btn-daynight');
    btnDay.addEventListener('click', () => {
      isNight = !isNight;
      applyPreset(isNight ? nightPreset : dayPreset);
      btnDay.textContent = isNight ? '夜景模式 · 点击切换' : '白天模式 · 点击切换';
    });

    // 隐藏 loading
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.remove(), 600);

    animate();
  </script>
</body>
</html>
